services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netsupport
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: netsupportai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netsupport -d netsupportai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - logs:/var/log/netsupportai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - logs:/var/log/netsupportai
    depends_on:
      - backend
      - redis

  # ─── Celery Beat (scheduler) ─────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - redis

  # ─── Flower (Celery monitor) ─────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    env_file: ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: builder
    restart: unless-stopped
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
  logs:
